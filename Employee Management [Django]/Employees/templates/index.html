<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Welcome user</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
        user-select: none;
      }
      body{
        height: 100dvh;
        width: 100dvw;

        > div {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          box-sizing: border-box;

          width: 100%;
          height: 100%;

          > div {
            background-color: antiquewhite;
            box-shadow: 1px 1px 5px #333333d0;
            border-radius: .5rem;
            padding: .75rem;
            width: 50%; 

            &:nth-child(even){
              margin: 1rem 0;
            }
            
            > div {
              display: flex;
              justify-content: space-between;

              > select {
                background-color: transparent;
                border: 1px #33333390 solid;
                border-radius: .25rem;
                padding: 0 .5rem;
              }
            }

            > ol {
              list-style-position: inside;

              > li {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                
                > span:hover{
                  text-decoration: underline;
                }
              }
              
              > li:nth-child(even){
                margin: .5rem 0;
              }
            }
          }
          > .header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;

            > nav {
              > ul {
                display: flex;
                justify-content: space-evenly;
                list-style: none;
                
                > li {
                  padding: 0 .5rem;

                  &:nth-child(even){
                    margin: 0 .5rem;
                  }
                }
              }
            }
          }
        }
      }
    </style>
	</head>
	<body>
    <div>
      <div class="header">
        <h3>Welcome admin</h3>
        <nav>
          <ul>
            <li onclick="location.href='/add-user'">Add new Employee</li>
             <!-- <li>Delete employees</li> -->
         </ul>
        </nav>
      </div>
      <div>
        <div>
          <h3 style="margin-bottom: .5rem;">Employee Lists</h3>
          <select id="search" onchange="search()">
            {% for dept in department %}
              {% if dept.id == search %}
                <option value="{{ dept.id }}" selected>{{ dept.name }}</option>
              {% else %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
              {% endif %}
            {% endfor %}
          </select>
        </div>
        <ol>
          {% if employees  %}
            {% for i in employees %} 
              <li>
                <span onclick="modify('{{ i.emp_id }}')">{{ i.lastname }} {{i.firstname}}</span>
                <span onclick="delete_user('{{ i.emp_id }}', '{{ i.lastname }}')">Delete employee</span>
              </li>
            {% endfor %}
          {% else %}
            <p style="text-align: center;">There's no data added here</p>
          {% endif %}
        </div>
      </ol>
    </div>
	</body>
	<script>
		function modify(id){
      location.href = `edit/${id}`
		}
		function delete_user(id, name){
      if(confirm(`Are you sure you want to delete ${name}'s data???`)){
        location.href = `delete/${id}`
      }
		}
    function search(){
      const _search = document.getElementById("search").value
      location.href = `?dept=${_search}`
    }
	</script>
</html>
