<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add new Employee</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        outline: none;
        border: 0;
      }
      body {
        width: 100dvw;
        height: 100dvh;

        > div {
          display: flex;
          flex-direction: column;
          height: 100%;
          width: 100%;

          justify-content: center;
          align-items: center;

          > form {
            display: flex;
            flex-direction: column;
            padding: .75rem;
            box-shadow: 1px 1px 5px #333333;
            border-radius: .5rem;
            align-items: flex-end;

            > label {
              display: flex;
              justify-content: space-between;
              border: 1px #33333390 solid;
              border-radius: .25rem;
              padding: 0 .25rem;
              width: 100%;

              &:nth-child(even){
                margin: .25rem 0;
              }
              
              > span{
                
                > sup{
                  color: red;
                }
              }

              > input, > select {
                background-color: transparent;
                width: 50%;
              }
            }
            > div{
              > input[type="submit"], input[type="button"]{
                background-color: transparent;
                border: 1px #33333390 solid;
                padding: .25rem;
                margin: .25rem 0;
                border-radius: .25rem;
              }
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="base">
      <form method="POST" action="/add-user">
        {% csrf_token %}
        <h3 style="text-align: center; width: 100%; margin-bottom: 1.25rem;">Add New Employee</h3>
        <label for="firstname"><span>First name:<sup>*</sup></span> <input type="text" name="firstname" id="firstname"></label>
        <label for="middlename">Middle name: <input type="text" name="middlename" id="middlename"> </label>
        <label for="lastname"><span>Lastname:<sup>*</sup></span> <input type="text" name="lastname" id="lastname"></label>
        <label><span>Department:<sup>*</sup></span>
          <select name="work_id">
            {% for ids in works %}
              <option value="{{ ids.id }}">{{ids.name}}</option>
            {% endfor %}
          </select>
        </label>
        <div>
          <input type="button" value="Back to main" onclick="location.href='../'">
          <input type="submit" value="Add new employee">
        </div>
      </form>
    </div>
  </body>
</html>
