<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User {{ employee.lastname }} - {{ employee.firstname }}</title>
    <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
        user-select: none;
      }
      body{
        height: 100dvh;
        width: 100dvw;

        > form {
          display: flex;
          flex-direction: column;
          width: 100%;
          
          > label{
            display: flex;
            justify-content: space-between;
            width: 50%;

            > input{
              width: 75%;
              box-sizing: border-box;
              margin-left: 25px;
            }
          }
        }
      }
    </style>
  </head>
  <body>
    <form method="POST" action="../update/{{employee.emp_id}}">
      {% csrf_token %}
      <label>Firstname: <input type="text" name="firstname" value="{{employee.firstname}}"></label>
      <label>Middlename: <input type="text" name="middlename" value="{{employee.middlename}}"></label>
      <label>Lastname: <input type="text" name="lastname" value="{{employee.lastname}}"></label>
      <label for="work_id">Work ID:
        <select id="work_id" name="work_id">
          {% for dept in departments %}
          {% if dept.id == employee.work_id %}
            <option value="{{dept.id}}" selected>{{ dept.name }}</option>
          {% else %}
            <option value="{{dept.id}}">{{ dept.name }}</option>
          {% endif %}
          {% endfor %}
        </select>
      </label>
      <input type="submit" value="Upadate">
    </form>
  </body>
</html>
