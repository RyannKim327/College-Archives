<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Welcome user</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
        user-select: none;
      }
      body{
        height: 100dvh;
        width: 100dvw;

        > div {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          box-sizing: border-box;

          width: 100%;
          height: 100%;
          > div {
            background-color: antiquewhite;
            box-shadow: 1px 1px 5px #333333d0;
            border-radius: .5rem;
            padding: .75rem;

            > ol {
              list-style-position: inside;

              > li:hover{
                text-decoration: underline;
              }
              
              > li:nth-child(even){
                margin: .5rem 0;
              }
            }
          }
        }
      }
    </style>
	</head>
	<body>
    <div>
      <div>
        <h3>Welcome user</h3>
        <ol>
          {% if employees  %}
          {% for i in employees %} 
          <li onclick="modify('{{ i.emp_id }}')">{{ i.lastname }} {{i.firstname}}</li>
          {% endfor %}
          {% endif %}
        </div>
      </ol>
    </div>
	</body>
	<script>
		function modify(id){
      location.href = `edit/${id}`
		}
	</script>
</html>
